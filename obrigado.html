<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--dark:#1F3427;--macha:#768D7F;--mint:#DAE4DA;--ice:#F5F9F5}
html,body{height:100%}
body{
  font-family:'Lexend',sans-serif;font-weight:300;
  background:var(--dark);color:var(--ice);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem;text-align:center;
  position:relative;overflow:hidden;
}
/* grade de fundo */
body::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(218,228,218,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(218,228,218,0.04) 1px,transparent 1px);
  background-size:64px 64px;pointer-events:none;
}
/* decorativo JE */
body::after{
  content:'JE';position:absolute;right:-2%;bottom:-10%;
  font-family:'DM Serif Display',serif;font-size:22rem;font-weight:700;
  color:rgba(218,228,218,0.03);pointer-events:none;line-height:1;
  user-select:none;
}
.card{
  position:relative;z-index:1;
  max-width:520px;width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(118,141,127,0.2);
  border-radius:4px;padding:3.5rem 3rem;
}
.logo{margin-bottom:2.5rem;}
.logo img{height:56px;width:auto;}
.check-circle{
  width:72px;height:72px;border-radius:50%;
  background:rgba(118,141,127,0.15);
  border:1px solid rgba(118,141,127,0.35);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 2rem;
}
.check-circle svg{width:32px;height:32px;color:var(--macha);}
h1{
  font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,2.4rem);
  color:var(--ice);line-height:1.2;margin-bottom:0.9rem;
}
h1 em{font-style:italic;color:var(--mint);}
.subtitle{
  font-size:0.93rem;line-height:1.8;color:rgba(218,228,218,0.55);
  font-weight:300;margin-bottom:2.5rem;
}
.redirect-info{
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:0.78rem;letter-spacing:0.06em;
  color:rgba(218,228,218,0.35);margin-bottom:2rem;
}
.redirect-info svg{width:15px;height:15px;color:var(--macha);flex-shrink:0;}
.progress-bar{
  width:100%;height:3px;
  background:rgba(118,141,127,0.15);
  border-radius:2px;overflow:hidden;margin-bottom:2rem;
}
.progress-fill{
  height:100%;background:var(--macha);border-radius:2px;width:0%;
  transition:width 3s linear;
}
.wpp-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:12px;
  width:100%;background:#25D366;color:#fff;
  padding:1rem 2rem;border-radius:2px;font-size:0.88rem;font-weight:500;
  letter-spacing:0.08em;text-decoration:none;transition:all 0.25s;
  margin-bottom:1rem;
}
.wpp-btn:hover{background:#20BA5A;transform:translateY(-2px);box-shadow:0 10px 28px rgba(37,211,102,0.2);}
.wpp-btn svg{width:20px;height:20px;}
.back-link{
  font-size:0.76rem;color:rgba(218,228,218,0.25);text-decoration:none;
  transition:color 0.2s;letter-spacing:0.04em;
}
.back-link:hover{color:var(--mint);}
.countdown{
  display:inline-block;
  font-family:'DM Serif Display',serif;
  font-size:1rem;color:var(--macha);font-weight:400;
  min-width:16px;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp 0.6s ease both;}
</style>
</head>
